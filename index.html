  <body>
    <div id="app"></div>

    <script type="module" src="/src/main.js"></script>

    <!-- Script pour gérer le chargement de l'app -->
    <script>
      (function() {
        // Détecte quand l'application Vue est montée
        const appElement = document.getElementById('app');
        
        // Crée un observer pour détecter quand l'app est chargée
        const observer = new MutationObserver(function(mutations) {
          mutations.forEach(function(mutation) {
            if (mutation.type === 'childList' && appElement.children.length > 0) {
              appElement.classList.add('loaded');
              observer.disconnect();
            }
          });
        });
        
        observer.observe(appElement, { childList: true, subtree: false });
        
        // Fallback timeout
        setTimeout(() => {
          appElement.classList.add('loaded');
          observer.disconnect();
        }, 1000);
      })();
    </script>
